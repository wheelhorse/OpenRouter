services:
  openwrt-builder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USER_UID=${UID:-1000}
        - USER_GID=${GID:-1000}
    image: openwrt-builder-2404
    container_name: openwrt-compile-job
    # Mount your current native directory into the container's workspace
    volumes:
      - ./:/workspace
    # Ensure it starts in the right directory
    working_dir: /workspace
    # Use host network to inherit proxy/DNS configuration from the host
    network_mode: "host"
    # Forward host proxy environment variables
    environment:
      - http_proxy
      - https_proxy
      - all_proxy
      - no_proxy
    # The script to run when the container starts
    command: /bin/bash ./build.sh
